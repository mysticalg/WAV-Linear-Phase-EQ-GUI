name: windows-build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Derive build version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            "APP_VERSION=${{ github.ref_name }}" >> $env:GITHUB_ENV
          } else {
            "APP_VERSION=dev-${{ github.run_number }}" >> $env:GITHUB_ENV
          }

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build Windows EXE
        shell: pwsh
        run: .\build_exe.ps1 -Name WAVLinearPhaseEQ

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build Windows installer
        shell: pwsh
        run: .\build_installer.ps1 -Version $env:APP_VERSION -Name WAVLinearPhaseEQ

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item dist\WAVLinearPhaseEQ.exe out\WAVLinearPhaseEQ-windows-x64.exe -Force
          Copy-Item dist\WAVLinearPhaseEQ-Setup.exe out\WAVLinearPhaseEQ-Setup.exe -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ env.APP_VERSION }}
          path: out/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/WAVLinearPhaseEQ-windows-x64.exe
            out/WAVLinearPhaseEQ-Setup.exe
